services:
  client:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_IMAGE_BASE_URL: ""
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - client_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

  admin:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
    ports:
      - "5174:5174"
    volumes:
      - ../admin:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

  db:
    image: mongo:7.0-jammy
    container_name: melody-mongo-dev
    env_file: .dev.env
    ports:
      - "27017:27017"
    volumes:
      - mongo_data_dev:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../server
      target: dev
    container_name: melody-backend-dev
    env_file: .dev.env
    environment:
      GOPROXY: https://proxy.golang.org|https://goproxy.cn|direct
      GOSUMDB: "off"
      PROJECT_IMAGES_DIR: /seed/project_images
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../server:/app
      - ../client/src/assets/project_images:/seed/project_images:ro
      - ${HOME}/go/pkg/mod:/go/pkg/mod:ro
      - go_build_cache:/root/.cache/go-build

volumes:
  client_node_modules:
  admin_node_modules:
  mongo_data_dev:
  go_build_cache:
