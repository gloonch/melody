version: "3.9"

services:
  client:
    image: node:20-alpine
    working_dir: /app
    env_file:
      - .dev.env
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - client_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  client_node_modules:
