name: melody

services:
  db:
    image: mongo:7.0-jammy
    container_name: melody-mongo-prod
    restart: unless-stopped
    env_file:
      - .prod.env
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../server
      target: prod
      pull: false
    container_name: melody-backend-prod
    restart: unless-stopped
    env_file:
      - .prod.env
    environment:
      GOPROXY: https://proxy.golang.org|https://goproxy.cn|direct
      PROJECT_IMAGES_DIR: /seed/project_images
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../client/src/assets/project_images:/seed/project_images:ro

  client:
    build:
      context: ..
      dockerfile: client/Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-}
    depends_on:
      - backend
    ports:
      - "3000:80"

  admin:
    build:
      context: ../admin
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api/v1}
    depends_on:
      - backend
    ports:
      - "3001:80"

volumes:
  mongo_data_prod:
