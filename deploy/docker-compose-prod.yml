services:
  db:
    image: mongo:4.4
    container_name: melody-mongo-prod
    restart: unless-stopped
    env_file:
      - .prod.env
    volumes:
      - mongo_data_prod:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongo --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../server
      target: prod
    container_name: melody-backend-prod
    restart: unless-stopped
    env_file:
      - .prod.env
    environment:
      GOPROXY: https://proxy.golang.org|https://goproxy.cn|direct
      PROJECT_IMAGES_DIR: /seed/project_images
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8080"
    volumes:
      - ../client/src/assets/project_images:/seed/project_images:ro

  client:
    build:
      context: ../client
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_IMAGE_BASE_URL: ${VITE_IMAGE_BASE_URL:-}
    container_name: melody-client-prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  admin:
    build:
      context: ../admin
      target: prod
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
        VITE_BASE_PATH: ${ADMIN_BASE_PATH:-/admin/}
    container_name: melody-admin-prod
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  nginx:
    image: nginx:alpine
    container_name: melody-nginx-prod
    restart: unless-stopped
    depends_on:
      - client
      - admin
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  mongo_data_prod:
