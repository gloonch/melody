worker_processes 1;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_vary on;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  upstream melody_backend {
    server backend:8080;
  }

  upstream melody_client {
    server client:80;
  }

  upstream melody_admin {
    server admin:80;
  }

  server {
    listen 80;
    server_name golmelo.com www.golmelo.com 45.159.150.80;

    client_max_body_size 128m;

    location = /admin {
      return 301 /admin/;
    }

    location ^~ /admin/ {
      proxy_pass http://melody_admin/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/assets/ {
      proxy_pass http://melody_admin/assets/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /assets/ {
      proxy_pass http://melody_client;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /fonts/ {
      proxy_pass http://melody_client;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /api/ {
      proxy_pass http://melody_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
      proxy_pass http://melody_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://melody_client;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
